<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Language enablement redirect</title>
</head>

<body class="app">
<p>This page has been moved to <a id="redirect" href="https://www.w3.org/International/i18n-drafts/pages/languagedev_participation">https://www.w3.org/International/i18n-drafts/pages/languagedev_participation</a>.</p>

<script>
var hash = ''
if (window.location.hash) hash = window.location.hash
var parameters = ''
if (window.location.search) parameters = window.location.search

document.getElementById('redirect').href =document.getElementById('redirect').textContent+ parameters + hash
</script>
</body>
</html>
